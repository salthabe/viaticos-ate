<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viáticos ATE</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --navy: #1a3a5c;
  --blue: #2d6a9f;
  --sky: #4a9fd4;
  --ice: #EBF3FB;
  --ice2: #d6e9f8;
  --white: #ffffff;
  --gray50: #f8fafc;
  --gray100: #f1f5f9;
  --gray200: #e2e8f0;
  --gray300: #cbd5e1;
  --gray500: #64748b;
  --gray700: #334155;
  --gray900: #0f172a;
  --green: #16a34a;
  --green-bg: #dcfce7;
  --red: #dc2626;
  --red-bg: #fee2e2;
  --yellow: #d97706;
  --yellow-bg: #fef3c7;
  --orange: #ea580c;
  --orange-bg: #ffedd5;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
  --shadow: 0 4px 16px rgba(0,0,0,.10);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.14);
  --radius: 12px;
  --radius-sm: 8px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--gray50);
  color: var(--gray900);
  min-height: 100vh;
  font-size: 14px;
}

/* ── LAYOUT ── */
.app { display: flex; min-height: 100vh; }

.sidebar {
  width: 240px;
  background: var(--navy);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
}

.sidebar-logo {
  padding: 24px 20px 20px;
  border-bottom: 1px solid rgba(255,255,255,.1);
}

.sidebar-logo .org {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--sky);
  margin-bottom: 4px;
}

.sidebar-logo .app-name {
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  line-height: 1.2;
}

.sidebar-logo .app-sub {
  font-size: 11px;
  color: rgba(255,255,255,.45);
  margin-top: 3px;
}

.sidebar-nav { padding: 16px 12px; flex: 1; }

.nav-section {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: rgba(255,255,255,.35);
  padding: 12px 8px 6px;
  margin-top: 8px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: var(--radius-sm);
  color: rgba(255,255,255,.7);
  cursor: pointer;
  transition: all .15s;
  font-size: 13.5px;
  font-weight: 500;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}

.nav-item:hover { background: rgba(255,255,255,.08); color: var(--white); }
.nav-item.active { background: rgba(74,159,212,.2); color: var(--sky); }
.nav-item .icon { font-size: 16px; width: 20px; text-align: center; }

.sidebar-footer {
  padding: 16px;
  border-top: 1px solid rgba(255,255,255,.1);
  font-size: 11px;
  color: rgba(255,255,255,.3);
  text-align: center;
}

.main { margin-left: 240px; flex: 1; display: flex; flex-direction: column; }

.topbar {
  background: var(--white);
  border-bottom: 1px solid var(--gray200);
  padding: 0 32px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}

.topbar-title { font-size: 16px; font-weight: 600; color: var(--gray900); }
.topbar-actions { display: flex; gap: 8px; align-items: center; }

.content { padding: 28px 32px; flex: 1; }

/* ── PERIOD SELECTOR ── */
.period-bar {
  background: var(--white);
  border: 1px solid var(--gray200);
  border-radius: var(--radius);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
  box-shadow: var(--shadow-sm);
}

.period-label { font-size: 12px; font-weight: 600; color: var(--gray500); text-transform: uppercase; letter-spacing: .06em; }

.period-select {
  padding: 7px 12px;
  border: 1.5px solid var(--gray200);
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: var(--gray900);
  background: var(--gray50);
  cursor: pointer;
  outline: none;
  transition: border-color .15s;
}

.period-select:focus { border-color: var(--sky); }

/* ── STATS GRID ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 20px;
  border: 1px solid var(--gray200);
  box-shadow: var(--shadow-sm);
}

.stat-card .label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--gray500); margin-bottom: 8px; }
.stat-card .value { font-size: 26px; font-weight: 700; color: var(--navy); font-variant-numeric: tabular-nums; }
.stat-card .sub { font-size: 12px; color: var(--gray500); margin-top: 4px; }
.stat-card.green .value { color: var(--green); }
.stat-card.red .value { color: var(--red); }
.stat-card.yellow .value { color: var(--yellow); }

/* ── CARDS & TABLES ── */
.card {
  background: var(--white);
  border-radius: var(--radius);
  border: 1px solid var(--gray200);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}

.card-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--gray100);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-title { font-size: 14px; font-weight: 600; color: var(--gray900); }
.card-body { padding: 0; }

table { width: 100%; border-collapse: collapse; }
thead th {
  background: var(--gray50);
  padding: 10px 16px;
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--gray500);
  border-bottom: 1px solid var(--gray200);
  white-space: nowrap;
}

tbody tr {
  border-bottom: 1px solid var(--gray100);
  transition: background .1s;
}

tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--gray50); }

tbody td {
  padding: 11px 16px;
  font-size: 13.5px;
  color: var(--gray700);
  vertical-align: middle;
}

.td-amount {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 500;
}

.td-name { font-weight: 600; color: var(--gray900); }

/* ── BADGES ── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 9px;
  border-radius: 20px;
  font-size: 11.5px;
  font-weight: 600;
}

.badge-pendiente { background: var(--yellow-bg); color: var(--yellow); }
.badge-aprobado { background: var(--green-bg); color: var(--green); }
.badge-rechazado { background: var(--red-bg); color: var(--red); }
.badge-debito { background: var(--orange-bg); color: var(--orange); }
.badge-pagado { background: #e0f2fe; color: #0369a1; }

/* ── BUTTONS ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: 13.5px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all .15s;
  text-decoration: none;
}

.btn-primary { background: var(--blue); color: var(--white); }
.btn-primary:hover { background: var(--navy); }
.btn-outline { background: transparent; color: var(--blue); border: 1.5px solid var(--blue); }
.btn-outline:hover { background: var(--ice); }
.btn-ghost { background: transparent; color: var(--gray700); border: 1.5px solid var(--gray200); }
.btn-ghost:hover { background: var(--gray100); }
.btn-danger { background: var(--red); color: white; }
.btn-danger:hover { opacity: .85; }
.btn-green { background: var(--green); color: white; }
.btn-green:hover { opacity: .85; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-icon { padding: 6px 8px; }

/* ── FORMS ── */
.form-grid { display: grid; gap: 16px; }
.form-grid-2 { grid-template-columns: 1fr 1fr; }
.form-grid-3 { grid-template-columns: 1fr 1fr 1fr; }

.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 12px; font-weight: 600; color: var(--gray700); }

.input, .select, textarea {
  padding: 9px 12px;
  border: 1.5px solid var(--gray200);
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: var(--gray900);
  background: var(--white);
  outline: none;
  transition: border-color .15s;
  width: 100%;
}

.input:focus, .select:focus, textarea:focus { border-color: var(--sky); }
.input-money { font-family: 'DM Mono', monospace; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15,23,42,.5);
  backdrop-filter: blur(3px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeIn .15s;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.modal {
  background: var(--white);
  border-radius: 16px;
  width: 560px;
  max-width: 94vw;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: slideUp .2s;
}

.modal-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--gray100);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.modal-title { font-size: 16px; font-weight: 700; }
.modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--gray500); padding: 0 4px; line-height: 1; }
.modal-close:hover { color: var(--gray900); }
.modal-body { padding: 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--gray100); display: flex; gap: 8px; justify-content: flex-end; }

/* ── TABS ── */
.tabs { display: flex; gap: 4px; margin-bottom: 20px; }
.tab {
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 13.5px;
  font-weight: 600;
  cursor: pointer;
  color: var(--gray500);
  transition: all .15s;
  border: none;
  background: none;
}

.tab:hover { color: var(--gray900); background: var(--gray100); }
.tab.active { background: var(--navy); color: var(--white); }

/* ── TOAST ── */
#toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  background: var(--gray900);
  color: white;
  padding: 12px 18px;
  border-radius: var(--radius-sm);
  font-size: 13.5px;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  animation: slideUp .2s;
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 260px;
}

.toast.success { background: #15803d; }
.toast.error { background: var(--red); }
.toast.warning { background: var(--yellow); color: var(--gray900); }

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 56px 32px;
  color: var(--gray500);
}

.empty-state .emoji { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 15px; font-weight: 500; }
.empty-state small { font-size: 13px; color: var(--gray300); }

/* ── AGENTE CARD (resumen) ── */
.agente-row-total {
  background: linear-gradient(90deg, var(--navy) 0%, var(--blue) 100%);
  color: white;
}

.agente-row-total td { color: white !important; font-weight: 700; }

.tope-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  background: var(--ice2);
  color: var(--navy);
}

.progress-bar-wrap { width: 80px; height: 6px; background: var(--gray200); border-radius: 3px; display: inline-block; vertical-align: middle; margin-left: 6px; }
.progress-bar-fill { height: 100%; border-radius: 3px; background: var(--sky); }

/* ── FILTERS ── */
.filters { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
.filter-chip {
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12.5px;
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid var(--gray200);
  background: var(--white);
  color: var(--gray500);
  transition: all .15s;
}

.filter-chip:hover { border-color: var(--sky); color: var(--sky); }
.filter-chip.active { background: var(--navy); color: white; border-color: var(--navy); }

.search-input {
  padding: 6px 12px;
  border: 1.5px solid var(--gray200);
  border-radius: 20px;
  font-size: 13px;
  outline: none;
  width: 200px;
  transition: border-color .15s;
}

.search-input:focus { border-color: var(--sky); }

/* ── INLINE EDIT ── */
.tope-inline {
  display: flex;
  align-items: center;
  gap: 6px;
}

.tope-value {
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
  transition: background .15s;
}

.tope-value:hover { background: var(--ice); }

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .form-grid-3 { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="org">Sindicato ATE</div>
      <div class="app-name">Viáticos</div>
      <div class="app-sub">Sistema de Reintegros</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Principal</div>
      <button class="nav-item active" onclick="navigate('dashboard')">
        <span class="icon">📊</span> Panel de Control
      </button>
      <button class="nav-item" onclick="navigate('tickets')">
        <span class="icon">🧾</span> Tickets
      </button>
      <div class="nav-section">Gestión</div>
      <button class="nav-item" onclick="navigate('agentes')">
        <span class="icon">👥</span> Agentes
      </button>
      <button class="nav-item" onclick="navigate('topes')">
        <span class="icon">🎯</span> Topes Mensuales
      </button>
      <button class="nav-item" onclick="navigate('periodos_pago')">
        <span class="icon">🗂️</span> Períodos de Pago
      </button>
      <div class="nav-section">Registros</div>
      <button class="nav-item" onclick="navigate('actas')">
        <span class="icon">📋</span> Libro de Actas
      </button>
      <div class="nav-section">Reportes</div>
      <button class="nav-item" onclick="navigate('reportes')">
        <span class="icon">📈</span> Reportes
      </button>
      <button class="nav-item" onclick="navigate('exportar')">
        <span class="icon">📥</span> Exportar
      </button>
    </nav>
    <div class="sidebar-footer">ATE Viáticos v1.0</div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <header class="topbar">
      <span class="topbar-title" id="topbar-title">Panel de Control</span>
      <div class="topbar-actions" id="topbar-actions"></div>
    </header>

    <div class="content" id="content">
      <!-- Dynamic content -->
    </div>
  </main>
</div>

<!-- MODALS -->
<div id="modal-container"></div>
<div id="toast-container"></div>

<script>
// ══════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════
const state = {
  page: 'dashboard',
  anio: new Date().getFullYear(),
  mes: new Date().getMonth() + 1,
  agentes: [],
  categorias: [],
  tickets: [],
  resumen: [],
  ticketFilter: 'todos',
  ticketSearch: '',
  ticketMeses: [],  // vacío = solo el mes actual del periodBar
  ticketVista: 'mes',  // 'mes' | 'anio' | 'todo'
  dashVista: 'mes',   // 'mes' | 'anio' | 'todo'
  filtroPeriodoPago: null,
  filtroPeriodoPagoNombre: null
};

const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

// ══════════════════════════════════════════════════════════
//  API
// ══════════════════════════════════════════════════════════
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch('/api' + path, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.detail || 'Error en la solicitud');
  }
  return res.json();
}

async function loadAll() {
  [state.agentes, state.categorias] = await Promise.all([
    api('GET', '/agentes'),
    api('GET', '/categorias')
  ]);
}

async function loadResumen() {
  if (state.dashVista === 'mes') {
    state.resumen = await api('GET', `/resumen?anio=${state.anio}&mes=${state.mes}`);
  } else if (state.dashVista === 'anio') {
    state.resumen = await api('GET', `/resumen/agrupado?anio=${state.anio}`);
  } else {
    state.resumen = await api('GET', '/resumen/agrupado');
  }
}

async function loadTickets() {
  if (state.filtroPeriodoPago) {
    state.tickets = await api('GET', `/tickets?periodo_pago_id=${state.filtroPeriodoPago}`);
    state.ticketMeses = [];
  } else if (state.ticketVista === 'todo') {
    state.tickets = await api('GET', '/tickets');
    state.ticketMeses = [];
  } else if (state.ticketVista === 'anio') {
    state.tickets = await api('GET', `/tickets?anio=${state.anio}`);
    state.ticketMeses = [];
  } else if (state.ticketMeses.length > 0) {
    const all = await api('GET', `/tickets?anio=${state.anio}`);
    state.tickets = all.filter(t => {
      const m = parseInt((t.fecha_gasto || '').slice(5, 7));
      return state.ticketMeses.includes(m);
    });
  } else {
    state.tickets = await api('GET', `/tickets?anio=${state.anio}&mes=${state.mes}`);
  }
}

// ══════════════════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════════════════
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const icon = type === 'success' ? '✓' : type === 'error' ? '✕' : '⚠';
  el.innerHTML = `<span>${icon}</span> ${msg}`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ══════════════════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════════════════
async function navigate(page) {
  state.page = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navMap = { dashboard: 0, tickets: 1, agentes: 3, topes: 4, exportar: 6 };
  document.querySelectorAll('.nav-item')[navMap[page]]?.classList.add('active');

  const titles = {
    dashboard: 'Panel de Control',
    tickets: 'Tickets de Viáticos',
    agentes: 'Gestión de Agentes',
    topes: 'Topes Mensuales',
    periodos_pago: 'Períodos de Pago',
    actas: 'Libro de Actas',
    reportes: 'Reportes y Estadísticas',
    exportar: 'Exportar Reportes'
  };

  document.getElementById('topbar-title').textContent = titles[page] || page;
  document.getElementById('topbar-actions').innerHTML = '';
  document.getElementById('content').innerHTML = '<div style="padding:40px;text-align:center;color:#64748b">Cargando...</div>';

  await loadAll();

  if (page === 'dashboard') await renderDashboard();
  else if (page === 'tickets') await renderTickets();
  else if (page === 'agentes') renderAgentes();
  else if (page === 'topes') await renderTopes();
  else if (page === 'periodos_pago') await renderPeriodosPago();
  else if (page === 'actas') await renderActas();
  else if (page === 'reportes') await renderReportes();
  else if (page === 'exportar') renderExportar();
}

// ══════════════════════════════════════════════════════════
//  PERIOD BAR
// ══════════════════════════════════════════════════════════
function periodBar() {
  const years = [2023, 2024, 2025, 2026];
  // Load cierre badge async after render
  setTimeout(async () => {
    const el = document.getElementById('cierre-badge');
    if (el) el.innerHTML = await getBadgeCierre();
    const btn = document.getElementById('btn-cierre');
    if (btn) {
      try {
        const est = await api('GET', `/periodos_cierre/estado?anio=${state.anio}&mes=${state.mes}`);
        btn.textContent = est.cerrado ? '🔓 Reabrir período' : '🔒 Cerrar período';
        btn.style.color = est.cerrado ? '#92400e' : '#166534';
      } catch {}
    }
  }, 0);

  return `
  <div class="period-bar">
    <span class="period-label">Período</span>
    <select class="period-select" onchange="changePeriod(this.value, null)">
      ${MESES.map((m, i) => `<option value="${i+1}" ${state.mes === i+1 ? 'selected' : ''}>${m}</option>`).join('')}
    </select>
    <select class="period-select" onchange="changePeriod(null, this.value)">
      ${years.map(y => `<option value="${y}" ${state.anio === y ? 'selected' : ''}>${y}</option>`).join('')}
    </select>
    <span id="cierre-badge" style="margin-left:6px"></span>
    <span style="flex:1"></span>
    <button id="btn-cierre" class="btn btn-ghost btn-sm" onclick="toggleCierrePeriodo()" style="font-size:12px">🔒 Cerrar período</button>
  </div>`;
}

async function changePeriod(mes, anio) {
  if (mes) state.mes = parseInt(mes);
  if (anio) state.anio = parseInt(anio);
  await navigate(state.page);
}

  document.getElementById('content').innerHTML = `
    ${periodBar()}

    <div class="filters" style="flex-wrap:wrap;gap:8px">
      <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
        ${['todos','pendiente','aprobado','debito_parcial','rechazado','pagado'].map(f => `
          <button class="filter-chip ${state.ticketFilter === f ? 'active' : ''}"
            onclick="setTicketFilter('${f}')">
            ${f === 'todos' ? 'Todos' : f === 'debito_parcial' ? 'Débito parcial' : f === 'pagado' ? 'Pagado' : cap(f)}

        <div style="display:flex;gap:6px;align-items:center;background:var(--ice);border-radius:8px;padding:6px 10px;flex-wrap:wrap">
          <span style="font-size:12px;color:var(--gray500);font-weight:600;white-space:nowrap">📅 Ver:</span>
          <button class="filter-chip ${state.ticketVista==='mes' && state.ticketMeses.length===0 ? 'active' : ''}"
            style="padding:3px 9px;font-size:11.5px" onclick="setTicketVista('mes')">
            ${MESES[state.mes-1].slice(0,3)}
          </button>
          <button class="filter-chip ${state.ticketVista==='anio' ? 'active' : ''}"
            style="padding:3px 9px;font-size:11.5px" onclick="setTicketVista('anio')">
            📆 ${state.anio}
          </button>
          <button class="filter-chip ${state.ticketVista==='todo' ? 'active' : ''}"
            style="padding:3px 9px;font-size:11.5px" onclick="setTicketVista('todo')">
            📚 Todo

          <span style="width:1px;background:var(--gray200);height:16px;margin:0 2px"></span>
          ${MESES.map((m, i) => {

            return `<button class="filter-chip ${active ? 'active' : ''}" style="padding:3px 9px;font-size:11px;opacity:${state.ticketVista==='todo'||state.ticketVista==='anio'?'0.4':'1'}"

      Mostrando: <strong>${
        state.filtroPeriodoPago ? 'Período: ' + state.filtroPeriodoPagoNombre :
        state.ticketVista === 'todo' ? 'Todo el historial' :
        state.ticketVista === 'anio' ? 'Año ' + state.anio :
        state.ticketMeses.length > 0 ? state.ticketMeses.map(m => MESES[m-1]).join(', ') + ' ' + state.anio :
        MESES[state.mes-1] + ' ' + state.anio
      }</strong> — ${filterTickets().length} ticket(s)
    </div>

    <div class="card" id="tickets-card">
      <div class="card-body">
        <div id="tickets-table-body">${renderTicketsTableHTML(filtered)}</div>
      </div>
    </div>`;
}

function filterTickets() {
  return state.tickets.filter(t => {
    const matchFilter = state.ticketFilter === 'todos' || t.estado === state.ticketFilter;
    const matchSearch = !state.ticketSearch || t.agente_nombre.toLowerCase().includes(state.ticketSearch.toLowerCase());
    return matchFilter && matchSearch;
  });
}

function setTicketFilter(f) {
  state.ticketFilter = f;
  renderTickets();
}

async function toggleMesTicket(mes) {
  if (state.ticketMeses.includes(mes)) {
    state.ticketMeses = state.ticketMeses.filter(m => m !== mes);
  } else {
    state.ticketMeses.push(mes);
  }
  await loadTickets();
  renderTickets();
}

async function limpiarMesesTicket() {
  state.ticketMeses = [];
  state.ticketVista = 'mes';
  await loadTickets();
  renderTickets();
}

async function cambiarPeriodoTickets(id) {
  state.filtroPeriodoPago = id ? parseInt(id) : null;
  await loadTickets();
  renderTickets();
}

async function setDashVista(vista) {
  state.dashVista = vista;
  await loadResumen();
  renderDashboard();
}

async function setTicketVista(vista) {
  state.ticketVista = vista;
  state.ticketMeses = [];
  await loadTickets();
  renderTickets();
}

function renderTicketsTable() {
  document.getElementById('tickets-table-body').innerHTML = renderTicketsTableHTML(filterTickets());
}

      <tr><th>Agente</th><th>Fecha</th><th>Categoría</th><th>Período</th><th>Comprobante</th><th>Descripción</th><th>Valor</th><th>Aprobado</th><th>Estado</th><th></th></tr>

                  <button class="btn btn-outline btn-sm" onclick="guardarTope(${a.id})">Guardar</button>
                  ${a.tope_efectivo !== a.tope_mensual && a.tope_efectivo > 0 ?
                    `<span style="font-size:11px;color:var(--orange);font-weight:600">Override: ${fmt(a.tope_efectivo)}</span>` : ''}
                </div>
              </td>
              <td class="td-amount">${fmt(a.total_aprobado + a.total_debito)}</td>
              <td class="td-amount" style="font-weight:700;color:var(--navy)">${fmt(a.a_transferir)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

async function guardarTope(agenteId) {
  const val = document.getElementById(`tope-${agenteId}`).value;
  await api('POST', '/topes', {
    agente_id: agenteId, anio: state.anio, mes: state.mes,
    tope_override: val ? parseFloat(val) : null
  });
  toast('Tope actualizado');
  await renderTopes();
}

function toggleFechasCustom(val) {
  const el = document.getElementById('cx-fechas');
  el.style.display = val === 'rango' ? 'grid' : 'none';
}

function toggleEstadoTodos(cb) {
  const items = document.querySelectorAll('.cx-est-item');
  if (cb.checked) {
    items.forEach(i => i.checked = false);
  }
}

function toggleEstadoItem() {
  const items = document.querySelectorAll('.cx-est-item');
  const anyChecked = [...items].some(i => i.checked);
  document.getElementById('cx-est-todos').checked = !anyChecked;
}

function exportarCustom() {
  const periodo = document.getElementById('cx-periodo').value;
  const agente  = document.getElementById('cx-agente').value;
  const tickets = document.getElementById('cx-inc-tickets').checked;
  const transf  = document.getElementById('cx-inc-transf').checked;
  const sem     = document.getElementById('cx-inc-sem').checked;

  // Recolectar estados seleccionados
  const todosMarcado = document.getElementById('cx-est-todos').checked;
  const estadosSeleccionados = todosMarcado ? [] :
    [...document.querySelectorAll('.cx-est-item:checked')].map(i => i.value);

  let params = new URLSearchParams();
  if (agente) params.append('agente_id', agente);
  estadosSeleccionados.forEach(e => params.append('estado', e));
  params.append('incluir_tickets', tickets);
  params.append('incluir_transferencias', transf);
  params.append('incluir_semanal', sem);

  if (periodo === 'periodo_pago') {
    const ppId = document.getElementById('cx-periodo-pago-id').value;
    if (!ppId) { toast('Seleccioná un período de pago', 'warning'); return; }
    window.location.href = `/api/periodos_pago/${ppId}/exportar/excel`;
    toast('Generando Excel del período...', 'success');
    return;
  } else if (periodo === 'mes') {
    params.append('anio', state.anio);
    params.append('mes', state.mes);
  } else if (periodo === 'anio') {
    params.append('anio', state.anio);
  } else if (periodo === 'rango') {
    const desde = document.getElementById('cx-desde').value;
    const hasta = document.getElementById('cx-hasta').value;
    if (!desde || !hasta) { toast('Ingresá las fechas desde y hasta', 'warning'); return; }
    params.append('desde', desde);
    params.append('hasta', hasta);
  }
  // 'todo' = sin filtros de fecha

  window.location.href = '/api/exportar/excel/custom?' + params.toString();
  toast('Generando Excel personalizado...', 'success');
}

function exportarTodo() {
  const params = new URLSearchParams({
    incluir_tickets: true, incluir_transferencias: false, incluir_semanal: false
  });
  window.location.href = '/api/exportar/excel/custom?' + params.toString();
  toast('Exportando historial completo...', 'success');
}

function openModal(html) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-overlay';
  overlay.innerHTML = `<div class="modal">${html}</div>`;
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.getElementById('modal-container').appendChild(overlay);
}

function closeModal() {
  document.getElementById('modal-overlay')?.remove();
}

  const fecha_gasto = document.getElementById('t-fecha').value;

  await api('POST', '/tickets', {
    agente_id, fecha_gasto, valor,
    categoria_id: parseInt(document.getElementById('t-cat').value) || null,
    comprobante: document.getElementById('t-comp').value || null,
    descripcion: document.getElementById('t-desc').value || null

  toast('Ticket guardado correctamente');
  await navigate(state.page);
}

async function revisarTicket(ticketId, modo) {
  const ticket = state.tickets.find(t => t.id === ticketId);
  if (!ticket) return;

  if (modo === 'rapido_aprobado') {
    await api('PUT', `/tickets/${ticketId}/revision`, { estado: 'aprobado', valor_aprobado: ticket.valor });
    toast('Ticket aprobado');
    await navigate(state.page);
    return;
  }

  openModal(`
    <div class="modal-header">
      <span class="modal-title">⚖️ Revisar Ticket #${ticketId}</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div style="background:var(--ice);border-radius:var(--radius-sm);padding:14px;margin-bottom:20px;font-size:13.5px">
        <div style="font-weight:700;color:var(--navy);margin-bottom:6px">${ticket.agente_nombre}</div>
        <div style="color:var(--gray500)">${formatDate(ticket.fecha_gasto)} · ${ticket.categoria_nombre || 'Sin categoría'} · ${ticket.comprobante || 'Sin comprobante'}</div>
        ${ticket.descripcion ? `<div style="margin-top:6px;color:var(--gray700)">${ticket.descripcion}</div>` : ''}
        <div style="font-size:20px;font-weight:700;color:var(--navy);margin-top:8px">${fmt(ticket.valor)}</div>
      </div>

      <div class="form-grid">
        <div class="field">
          <label>Decisión *</label>
          <select class="select" id="r-estado" onchange="toggleRevision(this.value)">
            <option value="aprobado">✅ Aprobar (monto completo)</option>
            <option value="debito_parcial">⚠️ Débito parcial (aprobar parcialmente)</option>
            <option value="rechazado">❌ Rechazar</option>
          </select>
        </div>

        <div class="field" id="r-monto-field" style="display:none">
          <label>Monto Aprobado</label>
          <input type="number" class="input input-money" id="r-monto" placeholder="0.00" step="0.01" max="${ticket.valor}" value="${ticket.valor}">
          <small style="color:var(--gray500)">Máximo: ${fmt(ticket.valor)}</small>
        </div>

        <div class="field" id="r-motivo-field" style="display:none">
          <label>Motivo del Rechazo / Débito</label>
          <textarea class="input" id="r-motivo" rows="2" placeholder="Indicar motivo..."></textarea>
        </div>

        <div class="field">
          <label>Revisado por</label>

        </div>

function toggleRevision(estado) {
  document.getElementById('r-monto-field').style.display = estado === 'debito_parcial' ? '' : 'none';
  document.getElementById('r-motivo-field').style.display = (estado === 'rechazado' || estado === 'debito_parcial') ? '' : 'none';
}

async function confirmarRevision(ticketId, valorOriginal) {
  const estado = document.getElementById('r-estado').value;
  const monto = parseFloat(document.getElementById('r-monto')?.value) || valorOriginal;
  const motivo = document.getElementById('r-motivo')?.value || null;
  const revisor = document.getElementById('r-revisor')?.value || null;

  await api('PUT', `/tickets/${ticketId}/revision`, {
    estado, motivo_rechazo: motivo,
    valor_aprobado: estado === 'debito_parcial' ? monto : estado === 'aprobado' ? valorOriginal : 0,
    revisado_por: revisor
  });

  closeModal();
  toast(estado === 'aprobado' ? 'Ticket aprobado' : estado === 'rechazado' ? 'Ticket rechazado' : 'Débito parcial aplicado');
  await navigate(state.page);
}

function formatDate(str) {
  if (!str) return '-';
  const [y, m, d] = str.split('-');
  return `${d}/${m}/${y}`;
}

function cap(str) {
  return str.charAt(0).toUpperCase() + str.slice(1);
}

function estadoBadge(estado) {
  const map = {
    pendiente: ['badge-pendiente', '⏳ Pendiente'],
    aprobado: ['badge-aprobado', '✅ Aprobado'],
    rechazado: ['badge-rechazado', '❌ Rechazado'],

}

//  BACKUP & RESTAURAR
// ══════════════════════════════════════════════════════════
async function restaurarBackup(input) {
  const file = input.files[0];
  if (!file) return;
  const status = document.getElementById('backup-status');
  status.textContent = 'Leyendo archivo...';
  status.style.color = 'var(--gray500)';

  try {
    const text = await file.text();
    const data = JSON.parse(text);

    if (!data.agentes || !data.tickets) {
      status.textContent = '❌ Archivo inválido';
      status.style.color = 'var(--red)';
      return;
    }

    const meta = data.metadata || {};
    const confirm_msg = `¿Restaurar backup?\n\n` +
      `Fecha del backup: ${meta.fecha_backup ? new Date(meta.fecha_backup).toLocaleString('es-AR') : 'desconocida'}\n` +
      `Agentes: ${data.agentes.length}\n` +
      `Tickets: ${data.tickets.length}\n\n` +
      `⚠ ATENCIÓN: Esto reemplazará TODOS los datos actuales.`;

    if (!confirm(confirm_msg)) {
      status.textContent = 'Cancelado';
      input.value = '';
      return;
    }

    status.textContent = 'Restaurando...';
    const res = await fetch('/api/restaurar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || 'Error al restaurar');
    }

    const result = await res.json();
    status.textContent = `✅ Restaurado: ${result.agentes_restaurados} agentes, ${result.tickets_restaurados} tickets`;
    status.style.color = 'var(--green)';
    toast(`Backup restaurado correctamente — ${result.tickets_restaurados} tickets`, 'success');
    input.value = '';

    // Reload dashboard
    setTimeout(() => navigate('dashboard'), 1500);

  } catch (err) {
    status.textContent = '❌ ' + err.message;
    status.style.color = 'var(--red)';
    toast('Error al restaurar: ' + err.message, 'error');
  }
}

async function leerExcelImport(file) {
  // Usar SheetJS (xlsx) para parsear el archivo
  const data = await file.arrayBuffer();
  const wb = XLSX.read(data, { type: 'array', cellDates: true });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

  // Encontrar fila de headers (buscar "agente_nombre" en las primeras 5 filas)
  let headerRow = -1;
  for (let i = 0; i < Math.min(5, rows.length); i++) {
    const rowStr = rows[i].join('|').toLowerCase();
    if (rowStr.includes('agente')) { headerRow = i; break; }
  }
  if (headerRow === -1) throw new Error('No se encontró fila de encabezados (debe tener "agente_nombre")');

  const headers = rows[headerRow].map(h => String(h).toLowerCase().trim()
    .replace(/ \*/g,'').replace(/\s*\(.*\)/,'').trim());

  const filas = [];
  for (let i = headerRow + 2; i < rows.length; i++) { // +2 para saltar la fila de instrucciones
    const row = rows[i];
    if (!row || row.every(c => c === '' || c === null || c === undefined)) continue;

    const obj = {};
    headers.forEach((h, idx) => {
      let val = row[idx];
      // Normalizar fechas de Excel (Date objects)
      if (val instanceof Date) {
        const y = val.getFullYear();
        const m = String(val.getMonth()+1).padStart(2,'0');
        const d = String(val.getDate()).padStart(2,'0');
        val = `${d}/${m}/${y}`;
      }
      obj[h] = val !== undefined && val !== null ? String(val).trim() : '';
    });

    // Mapear nombres de columna flexibles
    const agente = obj['agente_nombre'] || obj['agente'] || '';
    const fecha  = obj['fecha_gasto'] || obj['fecha'] || '';
    const valor  = obj['valor'] || obj['monto'] || obj['importe'] || '0';

    if (!agente && !fecha) continue;
    filas.push({
      agente_nombre: agente,
      fecha_gasto: fecha,
      categoria: obj['categoria'] || obj['categoría'] || '',
      comprobante: obj['comprobante'] || '',
      descripcion: obj['descripcion'] || obj['descripción'] || '',
      valor: valor,
      notas_internas: obj['notas_internas'] || ''
    });
  }
  return filas;
}

async function toggleCierrePeriodo() {
  const estado = await api('GET', `/periodos_cierre/estado?anio=${state.anio}&mes=${state.mes}`);
  const cerrado = estado.cerrado;
  const mesNombre = MESES[state.mes-1];

  if (cerrado) {
    if (!confirm(`¿Reabrir el período ${mesNombre} ${state.anio}?\n\nLos tickets podrán ser modificados nuevamente.`)) return;
    await api('POST', `/periodos_cierre/reabrir?anio=${state.anio}&mes=${state.mes}`);
    toast(`Período ${mesNombre} ${state.anio} reabierto`, 'success');
  } else {
    // Check pendientes first
    const res = state.resumen || [];
    const pendientes = res.reduce((s, a) => s + (a.cant_pendientes || 0), 0);
    let msg = `¿Cerrar el período ${mesNombre} ${state.anio}?`;
    if (pendientes > 0) {
      if (!confirm(`Hay ${pendientes} ticket(s) pendientes.\n\nSi cerrás el período no podrás modificar los tickets ya revisados.\n\n¿Continuar de todos modos?`)) return;
    } else {
      if (!confirm(msg + '\n\nUna vez cerrado, los tickets aprobados no podrán modificarse.')) return;
    }
    try {
      await api('POST', `/periodos_cierre?anio=${state.anio}&mes=${state.mes}`);
      toast(`Período ${mesNombre} ${state.anio} cerrado 🔒`, 'success');
    } catch(e) {
      toast(e.message, 'error'); return;
    }
  }
  await navigate(state.page);
}

          <div class="card-header">
            <span class="card-title">👥 Por Agente — ${state.anio}</span>
          </div>
          <div class="card-body" style="padding:20px" id="rep-agentes">
            <div style="color:var(--gray500);text-align:center">Cargando...</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">🔒 Historial de Cierres de Período</span>
        </div>
        <div class="card-body" style="padding:20px" id="rep-cierres">
          <div style="color:var(--gray500);text-align:center">Cargando...</div>
        </div>
      </div>

    </div>`;

  // Load all in parallel
  const [mensual, cats, agAnual, cierres] = await Promise.all([
    api('GET', `/reportes/mensual_anual?anio=${state.anio}`),
    api('GET', `/reportes/por_categoria?anio=${state.anio}&mes=${state.mes}`),
    api('GET', `/reportes/por_agente_anual?anio=${state.anio}`),
    api('GET', '/periodos_cierre'),
  ]);

  // --- Evolución mensual: bar chart SVG ---
  const maxVal = Math.max(...mensual.map(m => m.total_aprobado || 0), 1);
  const barW = 40, gap = 18, svgW = mensual.length * (barW + gap) + gap + 60;
  const svgH = 200;
  const chartH = 140;
  const bars = mensual.map((m, i) => {
    const h = Math.max(2, Math.round((m.total_aprobado / maxVal) * chartH));
    const x = gap + 30 + i * (barW + gap);
    const y = svgH - 40 - h;
    const mes = MESES[m.mes - 1].slice(0, 3);
    return `
      <rect x="${x}" y="${y}" width="${barW}" height="${h}" rx="4" fill="#2d6a9f"/>
      <text x="${x + barW/2}" y="${y - 5}" text-anchor="middle" font-size="9" fill="#64748b">$${Math.round(m.total_aprobado/1000)}k</text>
      <text x="${x + barW/2}" y="${svgH - 22}" text-anchor="middle" font-size="10" fill="#64748b">${mes}</text>
      <text x="${x + barW/2}" y="${svgH - 8}" text-anchor="middle" font-size="9" fill="#94a3b8">${m.cantidad}</text>`;
  }).join('');
  document.getElementById('rep-mensual').innerHTML = mensual.length ? `
    <div style="overflow-x:auto">
      <svg viewBox="0 0 ${Math.max(svgW, 400)} ${svgH}" style="width:100%;max-height:220px">
        <text x="8" y="12" font-size="9" fill="#94a3b8">Aprobado</text>
        ${bars}
        <text x="30" y="${svgH - 20}" font-size="9" fill="#94a3b8" text-anchor="middle">mes</text>
        <text x="30" y="${svgH - 5}" font-size="9" fill="#94a3b8" text-anchor="middle">tkt</text>
      </svg>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px">
      <div style="text-align:center;padding:10px;background:var(--ice);border-radius:8px">
        <div style="font-size:11px;color:var(--gray500);text-transform:uppercase;margin-bottom:4px">Total año</div>
        <div style="font-weight:700;color:var(--navy)">${fmt(mensual.reduce((s,m)=>s+(m.total_aprobado||0),0))}</div>
      </div>
      <div style="text-align:center;padding:10px;background:var(--ice);border-radius:8px">
        <div style="font-size:11px;color:var(--gray500);text-transform:uppercase;margin-bottom:4px">Tickets</div>
        <div style="font-weight:700;color:var(--navy)">${mensual.reduce((s,m)=>s+(m.cantidad||0),0)}</div>
      </div>
      <div style="text-align:center;padding:10px;background:var(--ice);border-radius:8px">
        <div style="font-size:11px;color:var(--gray500);text-transform:uppercase;margin-bottom:4px">Prom. mensual</div>
        <div style="font-weight:700;color:var(--navy)">${fmt(mensual.reduce((s,m)=>s+(m.total_aprobado||0),0) / (mensual.length||1))}</div>
      </div>
      <div style="text-align:center;padding:10px;background:var(--ice);border-radius:8px">
        <div style="font-size:11px;color:var(--gray500);text-transform:uppercase;margin-bottom:4px">Pendientes hoy</div>
        <div style="font-weight:700;color:var(--navy)">${mensual.reduce((s,m)=>s+(m.pendientes||0),0)}</div>
      </div>
    </div>` : '<div style="text-align:center;color:var(--gray500);padding:20px">Sin datos para este año</div>';

  // --- Por categoría: horizontal bars ---
  const maxCat = Math.max(...cats.map(c => c.total_aprobado || 0), 1);
  document.getElementById('rep-cats').innerHTML = cats.length ? cats.map(c => {
    const pct = Math.round((c.total_aprobado / maxCat) * 100);
    const tasaAprobacion = c.cantidad ? Math.round((c.cant_aprobados / c.cantidad) * 100) : 0;
    return `
      <div style="margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px">
          <span style="font-weight:600">${c.categoria}</span>
          <span style="color:var(--gray500)">${fmt(c.total_aprobado)} <small>(${c.cantidad} tkt)</small></span>
        </div>
        <div style="background:var(--gray200);border-radius:4px;height:8px">
          <div style="background:var(--blue);border-radius:4px;height:8px;width:${pct}%;transition:width .4s"></div>
        </div>
        <div style="font-size:11px;color:var(--gray500);margin-top:3px">${tasaAprobacion}% aprobación</div>
      </div>`;
  }).join('') : '<div style="text-align:center;color:var(--gray500)">Sin datos</div>';

  // --- Por agente anual: table ---
  const maxAg = Math.max(...agAnual.map(a => a.total_aprobado || 0), 1);
  document.getElementById('rep-agentes').innerHTML = agAnual.length ? `
    <table style="width:100%;font-size:12.5px;border-collapse:collapse">
      <thead><tr style="background:var(--ice)">
        <th style="padding:8px;text-align:left">Agente</th>
        <th style="padding:8px;text-align:right">Aprobado</th>
        <th style="padding:8px;text-align:center">Tkts</th>
        <th style="padding:8px;text-align:center">Rech.</th>
      </tr></thead>
      <tbody>
        ${agAnual.map(a => {
          const pct = Math.round((a.total_aprobado / maxAg) * 100);
          return `<tr style="border-bottom:1px solid var(--gray100)">
            <td style="padding:8px">
              <div>${a.nombre}</div>
              <div style="background:var(--gray200);border-radius:2px;height:4px;margin-top:4px">
                <div style="background:var(--sky);border-radius:2px;height:4px;width:${pct}%"></div>
              </div>
            </td>
            <td style="padding:8px;text-align:right;font-weight:600;color:var(--navy)">${fmt(a.total_aprobado)}</td>
            <td style="padding:8px;text-align:center">${a.total_tickets || 0}</td>
            <td style="padding:8px;text-align:center;color:${a.rechazados > 0 ? 'var(--red)' : 'var(--gray500)'}">${a.rechazados || 0}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>` : '<div style="text-align:center;color:var(--gray500)">Sin datos</div>';

  // --- Cierres ---
  document.getElementById('rep-cierres').innerHTML = cierres.length ? `
    <table style="width:100%;font-size:13px;border-collapse:collapse">
      <thead><tr style="background:var(--ice)">
        <th style="padding:8px 12px;text-align:left">Período</th>
        <th style="padding:8px 12px;text-align:left">Estado</th>
        <th style="padding:8px 12px;text-align:left">Cerrado por</th>
        <th style="padding:8px 12px;text-align:left">Fecha</th>
        <th style="padding:8px 12px"></th>
      </tr></thead>
      <tbody>
        ${cierres.map(c => `<tr style="border-bottom:1px solid var(--gray100)">
          <td style="padding:8px 12px;font-weight:600">${MESES[c.mes-1]} ${c.anio}</td>
          <td style="padding:8px 12px">
            ${c.cerrado
              ? '<span style="background:#fef2f2;color:#991b1b;padding:2px 8px;border-radius:12px;font-size:11.5px;font-weight:600">🔒 Cerrado</span>'
              : '<span style="background:#f0fdf4;color:#166534;padding:2px 8px;border-radius:12px;font-size:11.5px;font-weight:600">🔓 Abierto</span>'}
          </td>
          <td style="padding:8px 12px;color:var(--gray500)">${c.cerrado_por || '-'}</td>
          <td style="padding:8px 12px;color:var(--gray500)">${c.cerrado_en ? c.cerrado_en.replace('T',' ').slice(0,16) : '-'}</td>
          <td style="padding:8px 12px">
            ${c.cerrado
              ? `<button class="btn btn-ghost btn-sm" onclick="reabrirDesdeReportes(${c.anio},${c.mes})">Reabrir</button>`
              : ''}
          </td>
        </tr>`).join('')}
      </tbody>
    </table>` :
    '<div style="text-align:center;color:var(--gray500);padding:20px">No hay períodos cerrados todavía</div>';
}

async function reabrirDesdeReportes(anio, mes) {
  if (!confirm(`¿Reabrir el período ${MESES[mes-1]} ${anio}?`)) return;
  await api('POST', `/periodos_cierre/reabrir?anio=${anio}&mes=${mes}`);
  toast(`Período reabierto`, 'success');
  renderReportes();
}

async function marcarPagado(ticketId) {
  if (!confirm('¿Marcar este ticket como PAGADO?\n\nEsto indica que el reintegro ya fue efectivamente transferido al agente.')) return;
  await api('PUT', `/tickets/${ticketId}/revision`, {
    estado: 'pagado',
    revisado_por: 'Sistema'
  });
  toast('Ticket marcado como pagado 💸', 'success');
  await loadTickets();
  renderTickets();
}

async function desmarcarPagado(ticketId) {
  if (!confirm('¿Desmarcar el pago de este ticket?\n\nVolvera al estado "aprobado".')) return;
  await api('PUT', `/tickets/${ticketId}/revision`, {
    estado: 'aprobado',
    revisado_por: 'Sistema'
  });
  toast('Pago desmarcado — ticket vuelve a Aprobado');
  await loadTickets();
  renderTickets();
}

async function renderPeriodosPago() {
  document.getElementById('topbar-actions').innerHTML = `
    <button class="btn btn-primary btn-sm" onclick="openModalNuevoPeriodo()">+ Nuevo Período</button>`;

  const periodos = await api('GET', '/periodos_pago');

  document.getElementById('content').innerHTML = `
    <div style="display:grid;gap:14px">
      ${periodos.length === 0
        ? `<div class="empty-state"><div class="emoji">🗂️</div><p>Sin períodos de pago</p><small>Creá el primer período con el botón + Nuevo Período</small></div>`
        : periodos.map(pp => renderPeriodoCard(pp)).join('')
      }
    </div>`;
}

function renderPeriodoCard(pp) {
  const cerrado = pp.estado === 'cerrado';
  const totalAprobado = (pp.total_aprobado || 0);
  const borderColor = cerrado ? '#6b7280' : '#2d6a9f';
  const bgHeader = cerrado ? '#f3f4f6' : '#ebf3fb';
  const fechaCierre = pp.cerrado_en ? pp.cerrado_en.slice(0,10).split('-').reverse().join('/') : null;

  return `
    <div style="border:1px solid ${borderColor};border-left:5px solid ${borderColor};border-radius:10px;background:white;overflow:hidden">
      <div style="background:${bgHeader};padding:14px 18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          <span style="font-size:22px font-weight:800;color:var(--navy)">${String(pp.numero).padStart(3,'0')}</span>
          <div>
            <div style="font-weight:700;font-size:15px;color:var(--navy)">${pp.nombre}</div>
            ${pp.descripcion ? `<div style="font-size:12px;color:var(--gray500)">${pp.descripcion}</div>` : ''}
          </div>
          <span style="padding:3px 12px;border-radius:20px;font-size:11.5px;font-weight:600;
            background:${cerrado ? '#f3f4f6' : '#d4edda'};color:${cerrado ? '#6b7280' : '#155724'}">
            ${cerrado ? '🔒 Cerrado' : '🟢 Abierto'}
          </span>
          ${fechaCierre ? `<span style="font-size:11px;color:var(--gray500)">Cerrado el ${fechaCierre} por ${pp.cerrado_por||'—'}</span>` : ''}
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-ghost btn-sm" onclick="verTicketsPeriodo(${pp.id}, '${pp.nombre.replace(/'/g,"\'")}')">🧾 Ver tickets</button>
          <button class="btn btn-ghost btn-sm" onclick="window.location.href='/api/periodos_pago/${pp.id}/exportar/excel'">📥 Excel</button>
          ${!cerrado
            ? `<button class="btn btn-ghost btn-sm" style="color:#166534" onclick="cerrarPeriodoPago(${pp.id}, '${pp.nombre.replace(/'/g,"\'")}')">🔒 Cerrar</button>`
            : `<button class="btn btn-ghost btn-sm" style="color:#92400e" onclick="reabrirPeriodoPago(${pp.id})">🔓 Reabrir</button>`}
          <button class="btn btn-ghost btn-sm" onclick="editarPeriodoPago(${pp.id}, '${pp.nombre.replace(/'/g,"\'")}', '${(pp.descripcion||'').replace(/'/g,"\'")}')">✏️</button>
        </div>
      </div>
      <div style="padding:14px 18px;display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px">
        <div style="text-align:center;padding:10px;background:var(--ice);border-radius:8px">
          <div style="font-size:11px;color:var(--gray500);text-transform:uppercase;margin-bottom:4px">Total tickets</div>
          <div style="font-weight:700;font-size:18px;color:var(--navy)">${pp.total_tickets || 0}</div>
        </div>
        <div style="text-align:center;padding:10px;background:#fef9c3;border-radius:8px">
          <div style="font-size:11px;color:#854d0e;text-transform:uppercase;margin-bottom:4px">⏳ Pendientes</div>
          <div style="font-weight:700;font-size:18px;color:#854d0e">${pp.cant_pendientes || 0}</div>
        </div>
        <div style="text-align:center;padding:10px;background:#d4edda;border-radius:8px">
          <div style="font-size:11px;color:#155724;text-transform:uppercase;margin-bottom:4px">✅ Aprobados</div>
          <div style="font-weight:700;font-size:18px;color:#155724">${(pp.cant_aprobados||0)+(pp.cant_debito||0)}</div>
        </div>
        <div style="text-align:center;padding:10px;background:#e0f2fe;border-radius:8px">
          <div style="font-size:11px;color:#0369a1;text-transform:uppercase;margin-bottom:4px">💸 Pagados</div>
          <div style="font-weight:700;font-size:18px;color:#0369a1">${pp.cant_pagados || 0}</div>
        </div>
        <div style="text-align:center;padding:10px;background:#fef2f2;border-radius:8px">
          <div style="font-size:11px;color:#991b1b;text-transform:uppercase;margin-bottom:4px">❌ Rechazados</div>
          <div style="font-weight:700;font-size:18px;color:#991b1b">${pp.cant_rechazados || 0}</div>
        </div>
        <div style="text-align:center;padding:10px;background:#ede7f6;border-radius:8px">
          <div style="font-size:11px;color:#4c1d95;text-transform:uppercase;margin-bottom:4px">Total aprobado</div>
          <div style="font-weight:700;font-size:15px;color:#4c1d95">${fmt(pp.total_aprobado||0)}</div>
        </div>
      </div>
    </div>`;
}

function openModalNuevoPeriodo() {
  openModal(`
    <div class="modal-header">
      <span class="modal-title">🗂️ Nuevo Período de Pago</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" style="display:grid;gap:14px">
      <div>
        <label class="label">Nombre del período *</label>
        <input type="text" class="input" id="pp-nombre" placeholder="Ej: Marzo 2026, Cuota 1, etc." onkeydown="if(event.key==='Enter') crearPeriodoPago()">
      </div>
      <div>
        <label class="label">Descripción (opcional)</label>
        <input type="text" class="input" id="pp-desc" placeholder="Ej: Viáticos primer bimestre 2026">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="crearPeriodoPago()">✅ Crear período</button>
    </div>
  `);
  setTimeout(() => document.getElementById('pp-nombre')?.focus(), 100);
}

async function crearPeriodoPago() {
  const nombre = document.getElementById('pp-nombre').value.trim();
  const desc = document.getElementById('pp-desc').value.trim();
  if (!nombre) return toast('Ingresá un nombre para el período', 'error');
  try {
    const res = await api('POST', '/periodos_pago', { nombre, descripcion: desc || null });
    toast(`Período ${String(res.numero).padStart(3,'0')} creado`, 'success');
    closeModal();
    await renderPeriodosPago();
  } catch(e) {
    toast('Error: ' + e.message, 'error');
  }
}

function editarPeriodoPago(id, nombre, desc) {
  openModal(`
    <div class="modal-header">
      <span class="modal-title">✏️ Editar Período</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" style="display:grid;gap:14px">
      <div>
        <label class="label">Nombre *</label>
        <input type="text" class="input" id="pp-edit-nombre" value="${nombre}">
      </div>
      <div>
        <label class="label">Descripción</label>
        <input type="text" class="input" id="pp-edit-desc" value="${desc}">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarEditPeriodo(${id})">💾 Guardar</button>
    </div>
  `);
}

async function guardarEditPeriodo(id) {
  const nombre = document.getElementById('pp-edit-nombre').value.trim();
  const desc = document.getElementById('pp-edit-desc').value.trim();
  if (!nombre) return toast('El nombre es obligatorio', 'error');
  await api('PUT', `/periodos_pago/${id}`, { nombre, descripcion: desc || null });
  toast('Período actualizado', 'success');
  closeModal();
  renderPeriodosPago();
}

async function cerrarPeriodoPago(id, nombre) {
  if (!confirm(`¿Cerrar el período "${nombre}"?\n\nUna vez cerrado, no se podrán modificar sus tickets.`)) return;
  try {
    await api('POST', `/periodos_pago/${id}/cerrar`);
    toast('Período cerrado 🔒', 'success');
    renderPeriodosPago();
  } catch(e) {
    toast(e.message, 'error');
  }
}

async function reabrirPeriodoPago(id) {
  if (!confirm('¿Reabrir este período?')) return;
  await api('POST', `/periodos_pago/${id}/reabrir`);
  toast('Período reabierto', 'success');
  renderPeriodosPago();
}

async function verTicketsPeriodo(id, nombre) {
  // Navegar a tickets con filtro de período
  state.filtroPeriodoPago = id;
  state.filtroPeriodoPagoNombre = nombre;
  state.ticketVista = 'mes'; // reset
  await navigate('tickets');
}

const TIPOS_ACTA = [
  "Entrega de Viaticos",
  "Reunion / Asamblea",
  "Llamado / Citacion",
  "Resolucion / Acuerdo",
  "Otro"
];

const TIPO_ICONS = {
  "Entrega de Viaticos":  "💰",
  "Reunion / Asamblea":   "🤝",
  "Llamado / Citacion":   "📞",
  "Resolucion / Acuerdo": "✅",
  "Otro":                 "📄"
};

const TIPO_COLORS = {
  "Entrega de Viaticos":  { bg: "#d4edda", border: "#28a745", text: "#155724" },
  "Reunion / Asamblea":   { bg: "#d1ecf1", border: "#17a2b8", text: "#0c5460" },
  "Llamado / Citacion":   { bg: "#fff3cd", border: "#ffc107", text: "#856404" },
  "Resolucion / Acuerdo": { bg: "#ede7f6", border: "#7c3aed", text: "#4c1d95" },
  "Otro":                 { bg: "#f8f9fa", border: "#adb5bd", text: "#495057" }
};

let actasState = {
  actas: [],
  buscar: '',
  tipoFiltro: '',
  anioFiltro: new Date().getFullYear()
};

async function renderActas() {
  document.getElementById('topbar-actions').innerHTML = `
    <button class="btn btn-ghost btn-sm" onclick="exportarActasExcel()">📥 Exportar Excel</button>
    <button class="btn btn-primary btn-sm" onclick="openModalActa()">+ Nueva Acta</button>`;

  await cargarActas();
  renderActasList();
}

async function cargarActas() {
  const params = new URLSearchParams();
  if (actasState.buscar)    params.set('buscar', actasState.buscar);
  if (actasState.tipoFiltro) params.set('tipo', actasState.tipoFiltro);
  if (actasState.anioFiltro) params.set('anio', actasState.anioFiltro);
  actasState.actas = await api('GET', `/actas?${params}`);
}

function renderActasList() {
  const years = [...new Set(actasState.actas.map(a => (a.fecha||'').slice(0,4)).filter(Boolean))];
  const allYears = [2024, 2025, 2026, 2027];

  document.getElementById('content').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:16px">

      <!-- Filtros -->
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
        <input class="search-input" placeholder="🔍 Buscar en actas..." value="${actasState.buscar}"
          style="width:220px;margin:0"
          oninput="actasState.buscar=this.value;debounceActas()">
        <select class="input" style="width:200px;padding:8px 12px"
          onchange="actasState.tipoFiltro=this.value;cargarActas().then(renderActasList)">
          <option value="">Todos los tipos</option>
          ${TIPOS_ACTA.map(t => `<option value="${t}" ${actasState.tipoFiltro===t?'selected':''}>${TIPO_ICONS[t]} ${t}</option>`).join('')}
        </select>
        <select class="input" style="width:110px;padding:8px 12px"
          onchange="actasState.anioFiltro=this.value?parseInt(this.value):null;cargarActas().then(renderActasList)">
          <option value="">Todos</option>
          ${allYears.map(y => `<option value="${y}" ${actasState.anioFiltro==y?'selected':''}>${y}</option>`).join('')}
        </select>
        <span style="font-size:12px;color:var(--gray500);margin-left:4px">${actasState.actas.length} acta(s)</span>
      </div>

      <!-- Lista de actas -->
      <div id="actas-lista">
        ${actasState.actas.length === 0
          ? `<div class="empty-state"><div class="emoji">📋</div><p>Sin actas registradas</p><small>Creá la primera acta con el botón + Nueva Acta</small></div>`
          : actasState.actas.map(a => renderActaCard(a)).join('')
        }
      </div>
    </div>`;
}

function renderActaCard(a) {
  const col = TIPO_COLORS[a.tipo] || TIPO_COLORS["Otro"];
  const icon = TIPO_ICONS[a.tipo] || "📄";
  const fecha = a.fecha ? a.fecha.slice(0,10).split('-').reverse().join('/') : '-';
  const preview = (a.cuerpo || '').slice(0, 180) + ((a.cuerpo||'').length > 180 ? '...' : '');
  const partic = a.participantes ? `<div style="font-size:12px;color:var(--gray500);margin-top:6px">👥 ${a.participantes}</div>` : '';
  const redactor = a.redactado_por ? `<span style="font-size:11px;color:var(--gray500)">Redactado por: ${a.redactado_por}</span>` : '';

  return `
    <div style="border:1px solid ${col.border};border-left:4px solid ${col.border};border-radius:10px;background:white;padding:16px 20px;margin-bottom:10px;transition:box-shadow .15s"
         onmouseover="this.style.boxShadow='0 2px 12px rgba(0,0,0,.08)'" onmouseout="this.style.boxShadow=''">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap">
            <span style="background:${col.bg};color:${col.text};border:1px solid ${col.border};padding:2px 10px;border-radius:20px;font-size:11.5px;font-weight:600">${icon} ${a.tipo}</span>
            <span style="font-weight:700;color:var(--navy);font-size:13px">Acta N° ${a.numero_acta}</span>
            <span style="color:var(--gray500);font-size:12px">📅 ${fecha}</span>
          </div>
          <div style="font-weight:600;font-size:15px;color:var(--navy);margin-bottom:6px">${a.titulo}</div>
          ${preview ? `<div style="font-size:13px;color:var(--gray600);line-height:1.5;white-space:pre-wrap">${preview}</div>` : ''}
          ${partic}
          <div style="margin-top:8px">${redactor}</div>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          <button class="btn btn-ghost btn-sm" onclick="openModalActa(${a.id})" title="Editar">✏️</button>
          <button class="btn btn-danger btn-sm btn-icon" onclick="eliminarActa(${a.id}, '${(a.titulo||'').replace(/'/g,"\'")}')">🗑</button>
        </div>
      </div>
    </div>`;
}

let _actasDebounce;
function debounceActas() {
  clearTimeout(_actasDebounce);
  _actasDebounce = setTimeout(() => cargarActas().then(renderActasList), 350);
}

async function openModalActa(id = null) {
  const hoy = new Date().toISOString().slice(0,10);
  let acta = null;
  if (id) {
    acta = await api('GET', `/actas/${id}`);
  }
  const titulo_modal = acta ? `Editar Acta N° ${acta.numero_acta}` : 'Nueva Acta';
  const fecha_val = acta ? (acta.fecha||'').slice(0,10) : hoy;

  openModal(`
    <div class="modal-header">
      <span class="modal-title">📋 ${titulo_modal}</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" style="display:grid;gap:16px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div>
          <label class="label">Fecha *</label>
          <input type="date" class="input" id="acta-fecha" value="${fecha_val}">
        </div>
        <div>
          <label class="label">Tipo *</label>
          <select class="input" id="acta-tipo">
            ${TIPOS_ACTA.map(t => `<option value="${t}" ${acta?.tipo===t?'selected':''}>${TIPO_ICONS[t]} ${t}</option>`).join('')}
          </select>
        </div>
      </div>
      <div>
        <label class="label">Título *</label>
        <input type="text" class="input" id="acta-titulo" placeholder="Ej: Entrega de viáticos marzo 2026"
          value="${acta?.titulo||''}">
      </div>
      <div>
        <label class="label">Contenido / Cuerpo del acta</label>
        <textarea class="input" id="acta-cuerpo" rows="7"
          style="resize:vertical;font-family:inherit;line-height:1.6"
          placeholder="Escribí el contenido del acta aquí...&#10;&#10;Podés incluir:&#10;- Temas tratados&#10;- Acuerdos tomados&#10;- Valores de topes&#10;- Cualquier otra información relevante">${acta?.cuerpo||''}</textarea>
      </div>
      <div>
        <label class="label">Participantes</label>
        <input type="text" class="input" id="acta-participantes"
          placeholder="Ej: Juan Pérez, María García, Carlos López"
          value="${acta?.participantes||''}">
      </div>
      <div>
        <label class="label">Redactado por</label>
        <input type="text" class="input" id="acta-redactor"
          placeholder="Nombre de quien redacta el acta"
          value="${acta?.redactado_por||''}">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarActa(${id||'null'})">
        ${acta ? '💾 Guardar cambios' : '✅ Crear acta'}
      </button>
    </div>
  `);
}

async function guardarActa(id) {
  const fecha  = document.getElementById('acta-fecha').value;
  const tipo   = document.getElementById('acta-tipo').value;
  const titulo = document.getElementById('acta-titulo').value.trim();
  const cuerpo = document.getElementById('acta-cuerpo').value.trim();
  const partic = document.getElementById('acta-participantes').value.trim();
  const redact = document.getElementById('acta-redactor').value.trim();

  if (!fecha || !titulo) return toast('Completá fecha y título', 'error');

  const payload = { fecha, tipo, titulo,
    cuerpo: cuerpo || null,
    participantes: partic || null,
    redactado_por: redact || null };

  if (id) {
    await api('PUT', `/actas/${id}`, payload);
    toast('Acta actualizada', 'success');
  } else {
    const res = await api('POST', '/actas', payload);
    toast(`Acta N° ${res.numero_acta} creada`, 'success');
  }
  closeModal();
  await cargarActas();
  renderActasList();
}

async function eliminarActa(id, titulo) {
  if (!confirm(`¿Eliminar el acta "${titulo}"?\n\nEsta acción no se puede deshacer.`)) return;
  await api('DELETE', `/actas/${id}`);
  toast('Acta eliminada');
  await cargarActas();
  renderActasList();
}

function exportarActasExcel() {
  const anio = actasState.anioFiltro || '';
  const url = `/api/actas/exportar/excel${anio ? '?anio='+anio : ''}`;
  window.location.href = url;
  toast('Exportando libro de actas...', 'success');
}

//  INIT
// ══════════════════════════════════════════════════════════
navigate('dashboard');
</script>
</body>
</html>
